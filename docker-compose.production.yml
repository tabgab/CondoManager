# CondoManager Production Docker Compose
# Self-hosted alternative to Render/Vercel/Supabase
# 
# Usage:
#   docker-compose -f docker-compose.production.yml up -d
#
# Prerequisites:
#   - Docker Engine 20.10+
#   - Docker Compose 2.0+
#   - Domain name pointing to your server
#   - SSL certificate (Let's Encrypt or self-signed)

version: "3.8"

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: condomanager
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
      POSTGRES_DB: condomanager
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U condomanager"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - condomanager
    # Security: don't expose port publicly
    # Only accessible via backend network

  # Redis Cache & Session Store (optional but recommended)
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - condomanager

  # Backend FastAPI Application
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # Database
      DATABASE_URL: postgresql+asyncpg://condomanager:${DB_PASSWORD}@db:5432/condomanager
      DATABASE_URL_SYNC: postgresql://condomanager:${DB_PASSWORD}@db:5432/condomanager
      
      # Redis (optional)
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      
      # JWT
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY required}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      
      # Environment
      ENVIRONMENT: production
      DEBUG: "false"
      LOG_LEVEL: info
      
      # Web Push
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: mailto:admin@${DOMAIN:-localhost}
      
      # Telegram
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      
      # Frontend URL (for CORS)
      FRONTEND_URL: https://${DOMAIN:-localhost}
      CORS_ORIGINS: https://${DOMAIN:-localhost}
      
      # Email (optional)
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-none}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      DEFAULT_FROM_EMAIL: noreply@${DOMAIN:-localhost}
      
      # Cloudinary (optional)
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
    volumes:
      - backend_logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - condomanager
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Static Site (served by Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
        VITE_WS_URL: /ws
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - condomanager
    # Static files served by nginx in the container

  # Nginx Reverse Proxy + SSL
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_data:/etc/letsencrypt:ro
      - frontend_build:/usr/share/nginx/html:ro
    depends_on:
      - backend
      - frontend
    networks:
      - condomanager
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"

  # Certbot for Let's Encrypt SSL (optional)
  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - certbot_data:/etc/letsencrypt
      - certbot_logs:/var/log/letsencrypt
      - ./nginx/www:/var/www/certbot:ro
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"
    profiles:
      - ssl

  # Scheduled Task Runner (Recurring Tasks)
  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://condomanager:${DB_PASSWORD}@db:5432/condomanager
      # Same env vars as backend
      ENVIRONMENT: production
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    command: >
      sh -c "sleep 30 && 
             while true; do 
               python -c 'import asyncio; from app.services.scheduler import process_due_recurring_tasks; asyncio.run(process_due_recurring_tasks())';
               sleep 3600;
             done"
    depends_on:
      - db
    networks:
      - condomanager
    profiles:
      - scheduler

volumes:
  postgres_data:
  redis_data:
  backend_logs:
  certbot_data:
  certbot_logs:
  frontend_build:

networks:
  condomanager:
    driver: bridge

# Environment Variables Required:
# - DB_PASSWORD: Strong PostgreSQL password
# - REDIS_PASSWORD: Strong Redis password  
# - JWT_SECRET_KEY: 32+ char random string
# - VAPID_PUBLIC_KEY: Web Push public key
# - VAPID_PRIVATE_KEY: Web Push private key
# - TELEGRAM_BOT_TOKEN: Telegram bot token
# - DOMAIN: Your domain name (e.g., condomanager.example.com)
#
# Optional:
# - SENDGRID_API_KEY: For email notifications
# - CLOUDINARY_*: For image uploads
# - EMAIL_PROVIDER: sendgrid, smtp, or none
